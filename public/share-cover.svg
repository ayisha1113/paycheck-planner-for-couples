  <text x="112" y="286" fill="#1a1a1a" font-family="Georgia, serif" font-size="60" font-weight="700">for Couples</text>
  <text x="112" y="358" fill="#55514d" font-family="Arial, sans-serif" font-size="30">A clearer way to split bills,</text>
